name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/initial-setup

jobs:
  # ---------------------------------------------------------------------------
  # Code style — PSR-12 via PHP CS Fixer
  # ---------------------------------------------------------------------------
  style:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: php-cs-fixer
          coverage: none

      - name: Check PSR-12 style
        run: php-cs-fixer check --config=.php-cs-fixer.dist.php --diff

  # ---------------------------------------------------------------------------
  # Static analysis — PHPStan
  # ---------------------------------------------------------------------------
  analyse:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run PHPStan
        run: composer analyse

  # ---------------------------------------------------------------------------
  # Tests — matrix of PHP × Laravel versions
  # ---------------------------------------------------------------------------
  tests:
    name: Tests (PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '7.4'
            laravel: '8.*'
            testbench: '6.*'
            phpunit: '^9.5'
          - php: '8.1'
            laravel: '10.*'
            testbench: '8.*'
            phpunit: '^10.1'
          - php: '8.2'
            laravel: '12.*'
            testbench: '10.*'
            phpunit: '^11.5'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Laravel, Testbench & PHPUnit versions
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "phpunit/phpunit:${{ matrix.phpunit }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction

      - name: Run tests
        run: composer test
